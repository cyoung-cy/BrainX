global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - user-service:8080

  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway-service:8088

  - job_name: workspace-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - workspace-service:8082

  - job_name: admin-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - admin-service:8085

  - job_name: commerce-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - commerce-service:8084

  - job_name: ingestion-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - ingestion-service:8083

  - job_name: intelligence-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - intelligence-service:8086
