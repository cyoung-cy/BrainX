openapi: 3.0.3
info:
  title: BrainX API SSOT
  version: 1.0.0-revised
  license:
    name: Proprietary
    url: https://brainx.p-e.kr
  description: 'BrainX 공개 및 내부 REST 계약 문서.


    개정 정책:

    - Public/client API는 현재 구현된 Ingestion 발행 헬퍼(/v1/publish-jobs)를 제외하고 /api/v1 아래에 둔다.

    - 서비스 간 동기 API는 /internal/v1 아래에 명시적으로 격리한다.

    - 중복된 회원 탈퇴 취소 엔드포인트는 제거했다.

    - /support/inquiries는 /support/tickets로 통합했다.

    - 토큰 사용량 기록은 AsyncAPI 이벤트 우선으로 처리하며 공개 REST command는 제공하지 않는다.

    - 발행 작업은 현재 클립보드용 콘텐츠를 포함해 200 OK를 반환한다.

    - operation 단위 소비자 메타데이터는 x-consumers로 표현한다.

    - operation 단위 이벤트 결합은 x-produces-events로 표현하고 AsyncAPI SSOT를 참조한다.'
servers:
- url: https://brainx.p-e.kr
  description: AWS dev API 게이트웨이. 로컬 개발은 Gateway-Service 기본 포트 8088을 사용한다.
- url: https://api.brainx.com
  description: 운영 API 게이트웨이
tags:
- name: Identity & Access
  description: 인증, 계정 보안, 프로필 및 동의 관리
- name: Support
  description: 사용자 문의 티켓 통합 관리
- name: Knowledge Workspace
  description: 노트, 폴더, 링크, 공유, 워크스페이스의 원장 서비스
- name: Content Ingestion & Publishing
  description: 파일, 변환, 가져오기, 내보내기, 발행 및 확장 프로그램
- name: MCP Agent Gateway
  description: 외부 에이전트와 MCP 클라이언트용 도구 게이트웨이 및 범위 제한 API key 관리
- name: Knowledge Intelligence
  description: 시맨틱 검색, RAG, AI 제안, 리포트 및 모델 설정
- name: Commerce & Operations
  description: 플랜, 구독, 웹훅, 사용량, 대시보드, 텔레메트리 및 가이드
- name: Admin
  description: 관리자 콘솔 작업
- name: Internal Service APIs
  description: 서비스 간 동기 호출 API. 브라우저나 외부 클라이언트에는 노출하지 않는다.
security:
- bearerAuth: []
paths:
  /api/v1/auth/email-availability:
    get:
      operationId: checkEmailAvailability
      summary: 이메일 중복 확인
      tags:
      - Identity & Access
      x-producer-service: identity-access
      x-visibility: public
      x-consumers:
      - id: web.auth.signup
        type: frontend
        description: 회원가입 및 이메일 인증 화면
      x-produces-events: []
      x-internal-sync-calls: []
      x-async-boundary: false
      x-implementation-note: monitoring snapshots persist live Kafka consumer-group lag from Admin-Service so the dashboard renders the current backlog instead of an inferred value.
      parameters:
      - name: email
        in: query
        required: true
        schema:
          type: string
          format: email
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/EmailAvailabilityData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security: []
