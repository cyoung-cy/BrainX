components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
    scopedApiKey:
      type: apiKey
      in: header
      name: X-BrainX-Api-Key
    providerSignature:
      type: apiKey
      in: header
      name: X-Provider-Signature
    serviceTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: service-jwt
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Recommended for commands and job requests. Same key must return the same result for retries.
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 10
        minimum: 1
  schemas:
    ApiSuccessBase:
      type: object
      properties:
        success:
          type: boolean
          enum:
          - true
        message:
          type: string
      required:
      - success
      - message
      additionalProperties: false
    ApiErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
          - false
        data:
          nullable: true
        message:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            traceId:
              type: string
            details:
              type: object
              additionalProperties: true
              description: Machine-readable error details
          required:
          - code
          - message
          additionalProperties: true
      required:
      - success
      - message
      additionalProperties: false
    Provider:
      type: string
      enum:
      - kakao
      - google
      - apple
      - naver
    IsoDateTime:
      type: string
      format: date-time
    Id:
      type: string
      example: usr_01J...
    NullableString:
      type: string
      nullable: true
    StatusPending:
      type: string
      enum:
      - PENDING
    JobStatus:
      type: string
      enum:
      - PENDING
      - RUNNING
      - COMPLETED
      - FAILED
      - CANCELLED
    PageInfo:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
      required:
      - page
      - size
      - totalElements
      - totalPages
      additionalProperties: false
    EmailVerificationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        purpose:
          type: string
          enum:
          - SIGNUP
          - PASSWORD_CHANGE
      required:
      - email
      - purpose
      additionalProperties: false
    EmailVerificationResponseData:
      type: object
      properties:
        verificationId:
          type: string
        email:
          type: string
          format: email
        expiresAt:
          type: string
          format: date-time
      required:
      - verificationId
      - email
      - expiresAt
      additionalProperties: false
    EmailVerificationVerifyRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        verificationCode:
          type: string
        purpose:
          type: string
          enum:
          - SIGNUP
          - PASSWORD_CHANGE
      required:
      - email
