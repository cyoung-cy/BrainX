        markdown:
          type: string
        tags:
          type: array
          items:
            type: string
        folderId:
          type: string
          nullable: true
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
      - noteId
      - title
      - markdown
      - version
      - updatedAt
      additionalProperties: false
    InternalNoteContentPatchRequest:
