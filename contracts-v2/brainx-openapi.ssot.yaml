          type: string
          format: email
        nickname:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        role:
          type: string
          example: ROLE_USER
        accessToken:
          type: string
          nullable: true
        refreshToken:
          type: string
          nullable: true
