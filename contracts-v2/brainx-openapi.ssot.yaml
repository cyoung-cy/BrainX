      x-implementation-note: 현재 actor의 draft 목록은 actor별 dirty set을 직접 조회한다. 백그라운드 PostgreSQL flush가 USER actor dirty set key를 찾을 때는 Redis `KEYS` 대신 `SCAN MATCH workspace:note:dirty:user:* COUNT 500` 방식으로 점진 탐색한다.
