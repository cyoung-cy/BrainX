  /api/v1/notes/drafts/claim:
    post:
      operationId: claimGuestNoteDrafts
      summary: guest Redis draft를 회원 노트로 전환
      tags:
      - Knowledge Workspace
      x-producer-service: knowledge-workspace
      x-visibility: public
      x-consumers:
      - id: web.signup
        type: frontend
        description: 회원가입/로그인 직후 guest Redis draft를 USER PostgreSQL 노트로 저장
      x-produces-events:
      - NoteCreated
      - NoteContentSaved
      x-internal-sync-calls: []
      x-async-boundary: false
      description: |
        로그인된 USER actor가 기존 guest cookie의 Redis draft를 자신의 PostgreSQL 노트로
        claim한다. Gateway는 유효한 JWT 요청에서도 guest cookie가 있으면 X-Guest-Id를
        Workspace-Service로 전달해야 한다. 성공적으로 저장된 guest draft는 Redis draft key와
