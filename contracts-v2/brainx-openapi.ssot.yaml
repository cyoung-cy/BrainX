          - REPLACE_RANGE
          - APPEND
          - REPLACE_ALL
          - APPLY_AI_SUGGESTION
        patch:
          type: object
          additionalProperties: true
        causationId:
          type: string
      required:
      - sourceService
      - baseVersion
      - patchType
      - patch
      - causationId
      additionalProperties: false
