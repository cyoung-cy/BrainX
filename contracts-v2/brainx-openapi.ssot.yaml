      description: >
        2D/3D 마인드맵 클라이언트에 노트 그래프를 반환한다. `noteId`는
        표준 Workspace 노트 식별자이며, Workspace PostgreSQL 레코드, Neo4j 같은
        그래프 projection, Knowledge Intelligence read model/vector index, RAG citation,
        프론트엔드 그래프 상태에서 사용하는 식별자와 일치해야 한다. 그래프 projection은
        read model이며 노트와 링크의 권위 원장은 Workspace가 유지한다. Neo4j projection은
        노트 본문 `[[...]]` 위키링크, 수동 링크, 태그, 제목/본문 유사도를 다시 계산해
        `LINKED` 관계를 최신 상태로 유지하며, 전체 그래프 재생성 대신 변경된 노트와
        직접 관련된 노트만 증분 갱신한다.
