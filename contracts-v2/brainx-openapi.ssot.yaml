openapi: 3.0.3
info:
  title: BrainX API SSOT
  version: 1.0.0-revised
  description: 'BrainX public and internal REST contract.


    Revision policy:

    - Public/client API remains under /api/v1, except the currently implemented
      Ingestion publish helper which is exposed at /v1/publish-jobs.

    - Service-to-service synchronous APIs are explicitly isolated under /internal/v1.

    - Duplicate member-deletion cancel endpoint was removed.

    - /support/inquiries was consolidated into /support/tickets.

    - Token usage recording is event-first via AsyncAPI; no public REST command is exposed.

    - Publish jobs currently return 200 OK with clipboard-ready content.

    - Operation-level consumer metadata is expressed through x-consumers.

    - Operation-level event coupling is expressed through x-produces-events and references the AsyncAPI SSOT.'
servers:
- url: http://localhost:8080
  description: Local API Gateway
- url: https://api.brainx.com
  description: Production API Gateway
tags:
- name: Identity & Access
  description: Authentication, account security, profile and consent
- name: Support
  description: Unified user support tickets
- name: Knowledge Workspace
  description: Authoritative note/folder/link/share/workspace ledger
- name: Content Ingestion & Publishing
  description: Assets, conversions, imports, exports, publishing, extension and MCP
- name: Knowledge Intelligence
  description: Semantic search, RAG, AI suggestions, reports and model settings
- name: Commerce & Operations
  description: Plans, subscriptions, webhooks, usage, dashboards, telemetry and guides
- name: Admin
  description: Administrator console operations
- name: Internal Service APIs
  description: Service-to-service synchronous APIs. Not exposed to browsers or external clients.
