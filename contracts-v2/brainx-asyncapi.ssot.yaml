asyncapi: 3.0.0
info:
  title: BrainX Async Event SSOT
  version: 1.0.0-revised
  description: 'BrainX service-to-service asynchronous event contract.


    This document is the SSOT for domain events, integration events, and job lifecycle events.

    Synchronous preflight/command calls remain in the OpenAPI document under /internal/v1.'
servers:
  localKafka:
    host: localhost:9092
    protocol: kafka
    description: Local Kafka broker
  prodBroker:
    host: broker.brainx.internal:9092
    protocol: kafka
    description: Production internal event broker
defaultContentType: application/json
