x-ssot:
  owner: BrainX architecture
  revisionDate: '2026-06-16'
  openapi: brainx-openapi.ssot.yaml
  rules:
  - All event consumers must be idempotent by eventId.
  - Use correlationId from the originating HTTP request when available.
  - Use causationId for event-to-event chains and job lifecycle events.
  - Long-running work is represented as *JobRequested then *JobCompleted/*JobFailed.
  - 'Token usage is event-first: TokenUsageRecordedRequested is consumed by Commerce; TokenUsageRecorded is emitted after
    ledger write.'
  - Note read models, search indexes, graph projections, dashboards and wordclouds are eventually consistent.
x-service-catalog:
- id: identity-access
  description: User identity, authentication, account security and consent ledger
- id: knowledge-workspace
  description: Authoritative note/folder/link/share/workspace ledger
- id: content-ingestion-publishing
  description: Assets, conversions, imports, exports, extension capture and publishing
- id: knowledge-intelligence
  description: Semantic search, RAG, LLM features and AI suggestions; owns read models only
- id: commerce-operations
  description: Plans, billing, entitlements, token ledger, admin, telemetry and support
- id: notification-email
  description: Email, push and administrator notification workers
- id: security-audit
  description: Audit logging, risk detection and abuse monitoring
- id: analytics-dashboard
  description: Client event, knowledge dashboard, wordcloud and guide projections
- id: graph-projection
  description: Backlink and graph node/edge projection workers
- id: deletion-orchestrator
  description: Deferred deletion, anonymization and purge orchestration
