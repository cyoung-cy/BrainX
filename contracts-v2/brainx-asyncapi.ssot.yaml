  schemas:
    Provider:
      type: string
      enum:
      - kakao
      - google
      - apple
      - naver
    ConsentFlags:
      type: object
      properties:
        termsRequired:
          type: boolean
        privacyRequired:
          type: boolean
        marketingOptional:
          type: boolean
        behaviorAnalyticsOptional:
          type: boolean
      required:
      - termsRequired
      - privacyRequired
      - marketingOptional
      - behaviorAnalyticsOptional
      additionalProperties: false
    EventEnvelope:
      type: object
      description: Common BrainX event envelope
      properties:
        eventId:
          type: string
          example: evt_01J...
        eventType:
          type: string
        eventVersion:
          type: integer
          example: 1
        occurredAt:
          type: string
          format: date-time
        producer:
          type: string
        tenantId:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        correlationId:
          type: string
          example: req_01J...
        causationId:
          type: string
          nullable: true
        idempotencyKey:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
      required:
      - eventId
      - eventType
      - eventVersion
      - occurredAt
      - producer
      - correlationId
      - payload
      additionalProperties: false
    EmailVerificationRequestedPayload:
      type: object
      properties:
        verificationId:
          type: string
        email:
          type: string
          format: email
        purpose:
          type: string
          enum:
          - SIGNUP
          - PASSWORD_CHANGE
        expiresAt:
          type: string
          format: date-time
      required:
      - verificationId
      - email
      - purpose
      - expiresAt
      additionalProperties: false
    UserRegisteredPayload:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        signupMethod:
          type: string
          enum:
          - EMAIL
          - OAUTH
        provider:
          type: string
          nullable: true
      required:
      - userId
      - email
      - signupMethod
      additionalProperties: false
    ConsentRecordedPayload:
      type: object
      description: Consent snapshot recorded during email signup or OAuth onboarding completion.
      properties:
        userId:
          type: string
        consents:
          $ref: '#/components/schemas/ConsentFlags'
        recordedAt:
          type: string
          format: date-time
      required:
      - userId
      - consents
      - recordedAt
      additionalProperties: false
    UserLoggedInPayload:
      type: object
      properties:
        userId:
          type: string
        method:
          type: string
          enum:
          - LOCAL
          - OAUTH
        ipHash:
          type: string
          nullable: true
        userAgentHash:
          type: string
          nullable: true
      required:
      - userId
      - method
      additionalProperties: false
    UserLoggedOutPayload:
      type: object
      properties:
        userId:
          type: string
        sessionId:
          type: string
          nullable: true
      required:
      - userId
      additionalProperties: false
    OAuthAccountLinkedPayload:
