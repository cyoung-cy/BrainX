x-ssot:
  owner: BrainX architecture
  revisionDate: '2026-06-16'
  openapi: brainx-openapi.ssot.yaml
  rules:
  - All event consumers must be idempotent by eventId.
  - Use correlationId from the originating HTTP request when available.
  - Use causationId for event-to-event chains and job lifecycle events.
  - Long-running work is represented as *JobRequested then *JobCompleted/*JobFailed.
  - 'Token usage is event-first: TokenUsageRecordedRequested is consumed by Commerce; TokenUsageRecorded is emitted after
    ledger write.'
  - Note read models, search indexes, graph projections, dashboards and wordclouds are eventually consistent.
  - Workspace noteId is the canonical cross-system note identifier for PostgreSQL records, graph projections such as Neo4j, Knowledge Intelligence vector/RAG indexes, RAG citations and frontend graph state.
  - Graph databases are projections/read models. Accepted note links must be created through Workspace commands and then projected to graph storage.
x-service-catalog:
- id: User-Service
  description: User identity, authentication, onboarding, account security, consent, my page and note usage statistics
- id: Admin-Service
  description: Administrator console, user management, payment/refund operations, monitoring, user statistics, support replies and model token usage dashboards
- id: AI-Service
  description: Semantic search, RAG, LLM orchestration, AI recommendation, summarization and token usage event production
- id: Ingestion-Service
  description: File processing, conversion, import, export and external integration workflows
- id: Commerce-Service
  description: Payment APIs, plans, subscriptions, billing and commerce entitlement workflows
- id: Workspace-Service
  description: Authoritative notes, folders, links, graph and workspace ledger
