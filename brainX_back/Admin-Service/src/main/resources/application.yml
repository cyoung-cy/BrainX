server:
  port: ${SERVER_PORT:8085}

spring:
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:../env/admin-service.env[.properties]
  application:
    name: Admin-Service
  datasource:
    url: ${DB_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${ADMIN_DB_NAME:brainx_admin}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:change_me}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

brainx:
  jwt:
    secret: ${JWT_SECRET:replace_with_at_least_32_byte_secret}
    access-token-expiration-millis: ${ADMIN_JWT_ACCESS_EXPIRATION:43200000}
  admin:
    seed:
      login-id: ${SEED_ADMIN_LOGIN_ID:admin}
      password: ${SEED_ADMIN_PASSWORD:admin1234}
      name: ${SEED_ADMIN_NAME:최고관리자}
  service-token: ${SERVICE_TOKEN:local-service-token}
  services:
    gateway-service-url: ${GATEWAY_SERVICE_URL:http://localhost:8088}
    user-health-url: ${USER_HEALTH_URL:${brainx.services.gateway-service-url}/internal/v1/health/user}
    commerce-health-url: ${COMMERCE_HEALTH_URL:${brainx.services.gateway-service-url}/internal/v1/health/commerce}
    workspace-health-url: ${WORKSPACE_HEALTH_URL:${brainx.services.gateway-service-url}/internal/v1/health/workspace}
    ingestion-health-url: ${INGESTION_HEALTH_URL:${brainx.services.gateway-service-url}/internal/v1/health/ingestion}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.brainx: DEBUG
