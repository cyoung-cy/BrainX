server:
  port: ${SERVER_PORT:8085}

spring:
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:../env/admin-service.env[.properties]
  application:
    name: Admin-Service
  datasource:
    url: ${DB_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${ADMIN_DB_NAME:brainx_admin}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:change_me}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

brainx:
  service-token: ${SERVICE_TOKEN:local-service-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.brainx: DEBUG
