server:
  port: ${SERVER_PORT:8085}

spring:
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:../env/admin-service.env[.properties]
  application:
    name: Admin-Service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}
  datasource:
    url: ${DB_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${ADMIN_DB_NAME:brainx_admin}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:change_me}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

brainx:
  jwt:
    secret: ${JWT_SECRET:replace_with_at_least_32_byte_secret}
    access-token-expiration-millis: ${ADMIN_JWT_ACCESS_EXPIRATION:43200000}
  admin:
    seed:
      login-id: ${SEED_ADMIN_LOGIN_ID:admin}
      password: ${SEED_ADMIN_PASSWORD:admin1234}
      name: ${SEED_ADMIN_NAME:BrainX Admin}
    monitoring:
      timezone: ${BRAINX_ADMIN_MONITORING_TIMEZONE:Asia/Seoul}
      daily-snapshot-cron: ${BRAINX_ADMIN_MONITORING_DAILY_SNAPSHOT_CRON:0 59 23 * * *}
  email:
    from: ${MAIL_FROM:${spring.mail.username}}
  service-token: ${SERVICE_TOKEN:local-service-token}
  services:
    gateway-service-url: ${GATEWAY_SERVICE_URL:http://localhost:8088}
    user-service-url: ${USER_SERVICE_URL:http://localhost:8080}
    commerce-service-url: ${COMMERCE_SERVICE_URL:http://localhost:8084}
    workspace-service-url: ${WORKSPACE_SERVICE_URL:http://localhost:8082}
    ingestion-service-url: ${INGESTION_SERVICE_URL:http://localhost:8083}
    intelligence-service-url: ${INTELLIGENCE_SERVICE_URL:http://localhost:8086}
    user-health-url: ${USER_HEALTH_URL:${brainx.services.user-service-url}/actuator/health}
    commerce-health-url: ${COMMERCE_HEALTH_URL:${brainx.services.commerce-service-url}/actuator/health}
    workspace-health-url: ${WORKSPACE_HEALTH_URL:${brainx.services.workspace-service-url}/actuator/health}
    ingestion-health-url: ${INGESTION_HEALTH_URL:${brainx.services.ingestion-service-url}/actuator/health}
    intelligence-health-url: ${INTELLIGENCE_HEALTH_URL:${brainx.services.intelligence-service-url}/actuator/health}
  kafka:
    monitoring:
      consumer-group-id: ${BRAINX_KAFKA_MONITORING_CONSUMER_GROUP_ID:intelligence-service}

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.brainx: DEBUG
