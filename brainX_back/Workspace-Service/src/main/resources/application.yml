server:
  port: ${SERVER_PORT:8082}

spring:
  autoconfigure:
    exclude:
    - org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration
  config:
    import:
    - optional:file:../.env[.properties]
    - optional:file:../env/workspace-service.env[.properties]
  application:
    name: Workspace-Service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  datasource:
    url: ${DB_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${WORKSPACE_DB_NAME:brainx_workspace}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:change_me}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  sql:
    init:
      mode: always
      schema-locations:
        - classpath:db/migration/V20260702_01__repair_workspace_note_links_link_type.sql
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

brainx:
  jwt:
    secret: ${JWT_SECRET:replace_with_at_least_32_byte_secret}
  service-token: ${SERVICE_TOKEN:local-service-token}
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:3000}
  seed-demo-data: ${SEED_DEMO_DATA:true}
  workspace:
    dev-fallback-enabled: ${WORKSPACE_DEV_FALLBACK_ENABLED:false}
    draft:
      ttl-seconds: ${WORKSPACE_DRAFT_TTL_SECONDS:86400}
      flush-interval-seconds: ${WORKSPACE_DRAFT_FLUSH_INTERVAL_SECONDS:30}
      flush-idle-seconds: ${WORKSPACE_DRAFT_FLUSH_IDLE_SECONDS:10}
  graph:
    neo4j:
      enabled: ${NEO4J_ENABLED:true}
      uri: ${NEO4J_URI:bolt://localhost:7687}
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:brainx_neo4j_local_password}
      backfill-on-startup: ${NEO4J_BACKFILL_ON_STARTUP:true}
  events:
    outbox:
      enabled: ${BRAINX_EVENTS_OUTBOX_ENABLED:false}
      relay-delay-ms: ${BRAINX_EVENTS_OUTBOX_RELAY_DELAY_MS:2000}
logging:
  level:
    com.brainx: DEBUG

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,redis
        liveness:
          include: livenessState
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
