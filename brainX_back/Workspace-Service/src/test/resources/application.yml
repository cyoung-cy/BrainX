server:
  port: 0

spring:
  autoconfigure:
    exclude: []
  application:
    name: Workspace-Service-Test
  datasource:
    url: jdbc:h2:mem:brainx_workspace_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: brainx_neo4j_local_password

brainx:
  jwt:
    secret: test_secret_that_is_long_enough_for_hmac_sha256
  service-token: test-service-token
  public-base-url: http://localhost:3000
  graph:
    neo4j:
      enabled: true
      uri: bolt://localhost:7687
      username: neo4j
      password: brainx_neo4j_local_password
      backfill-on-startup: false
