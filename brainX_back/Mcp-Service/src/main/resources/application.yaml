server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: mcp-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${MCP_DB_NAME:brainx_mcp}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:${POSTGRES_USER:postgres}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:${JPA_DDL_AUTO:update}}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    mcp:
      server:
        name: brainx-mcp
        version: 0.1.0
        protocol: STATELESS
        type: SYNC
        capabilities:
          resource: false
          prompt: false
          completion: false
        stateless:
          mcp-endpoint: /mcp

management:
  endpoints:
    web:
      exposure:
        include: health,info

brainx:
  jwt:
    secret: ${JWT_SECRET:replace_with_at_least_32_byte_secret}
  service-token: ${SERVICE_TOKEN:local-service-token}
  workspace:
    base-url: ${WORKSPACE_SERVICE_URL:http://localhost:8082}
    timeout: ${WORKSPACE_SERVICE_TIMEOUT:5s}
  intelligence:
    base-url: ${INTELLIGENCE_SERVICE_URL:http://localhost:8086}
    timeout: ${INTELLIGENCE_SERVICE_TIMEOUT:10s}
  mcp:
    api-key:
      prefix: ${BRAINX_MCP_API_KEY_PREFIX:bxk_live_}
