openapi: 3.0.3
info:
  title: BrainX API SSOT - Knowledge Intelligence Consumed APIs
  version: 1.0.0-revised
  license:
    name: Proprietary
    url: https://brainx.p-e.kr
  description: OpenAPI slice for synchronous internal APIs consumed by Intelligence Service. Provider-owned API behavior remains
    governed by the source SSOT.
servers:
- url: https://brainx.p-e.kr
  description: AWS dev API 게이트웨이. 로컬 개발은 Gateway-Service 기본 포트 8088을 사용한다.
- url: https://api.brainx.com
  description: 운영 API 게이트웨이
tags:
- name: Internal Service APIs
  description: 서비스 간 동기 호출 API. 브라우저나 외부 클라이언트에는 노출하지 않는다.
paths:
  /internal/v1/entitlements/check:
    post:
      operationId: checkEntitlementsInternal
      summary: '[Internal] 권한/쿼터 확인'
      tags:
      - Internal Service APIs
      x-producer-service: commerce-operations
      x-visibility: internal
      x-consumers:
      - id: internal.knowledge-intelligence
        type: internal-service
        description: Knowledge Intelligence 동기 호출자
      - id: internal.knowledge-workspace
        type: internal-service
        description: Knowledge Workspace 동기 호출자
      - id: internal.content-ingestion-publishing
        type: internal-service
        description: 콘텐츠 수집 작업 워커 동기 호출자
      x-produces-events: []
      x-internal-sync-calls: []
      x-async-boundary: false
      description: 서비스 호출 전 사전 preflight. 이벤트로 대체하지 않는다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntitlementsCheckRequest'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/EntitlementsCheckData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - serviceTokenAuth: []
  /internal/v1/workspace/notes/{noteId}/snapshot:
    get:
      operationId: getNoteSnapshotInternal
      summary: '[Internal] 노트 최신 스냅샷 조회'
      tags:
      - Internal Service APIs
      x-producer-service: knowledge-workspace
      x-visibility: internal
      x-consumers:
      - id: internal.knowledge-intelligence
        type: internal-service
        description: Knowledge Intelligence 동기 호출자
      - id: internal.content-ingestion-publishing
        type: internal-service
        description: 콘텐츠 수집 작업 워커 동기 호출자
      x-produces-events: []
      x-internal-sync-calls: []
      x-async-boundary: false
      description: 기본은 이벤트 기반 read model 사용. 반드시 최신 원문이 필요한 작업에서만 호출한다.
      parameters:
      - name: noteId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/InternalNoteSnapshotData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - serviceTokenAuth: []
  /internal/v1/workspace/notes/{noteId}/content-patches:
    post:
      operationId: patchNoteContentInternal
      summary: '[Internal] 노트 본문 패치 command'
      tags:
      - Internal Service APIs
      x-producer-service: knowledge-workspace
      x-visibility: internal
      x-consumers:
      - id: internal.knowledge-intelligence
        type: internal-service
        description: Knowledge Intelligence 동기 호출자
      x-produces-events:
      - NoteContentSaved
      x-internal-sync-calls: []
      x-async-boundary: false
      description: AI 제안 수락 이후 타 서비스의 노트 변경을 Workspace 원장으로 강제한다.
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - name: noteId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalNoteContentPatchRequest'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/NoteContentSaveData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - serviceTokenAuth: []
components:
  securitySchemes:
    serviceTokenAuth:
      type: apiKey
      in: header
      name: X-Service-Token
      description: Shared internal service token used by Gateway and backend services for `/internal/v1/**` calls.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: 명령 및 작업 요청에 권장한다. 같은 키로 재시도하면 같은 결과를 반환해야 한다.
  schemas:
    ApiSuccessBase:
      type: object
      properties:
        success:
          type: boolean
          enum:
          - true
        message:
          type: string
      required:
      - success
      - message
      additionalProperties: false
    ApiErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
          - false
        data:
          type: object
          nullable: true
        message:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            traceId:
              type: string
            details:
              type: object
              additionalProperties: true
              description: 기계가 읽을 수 있는 오류 상세 정보
          required:
          - code
          - message
          additionalProperties: true
      required:
      - success
      - message
      additionalProperties: false
    NoteContentSaveData:
      type: object
      properties:
        noteId:
          type: string
        version:
          type: integer
        savedAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
          - SAVED
        conflict:
          type: object
          additionalProperties: true
      required:
      - noteId
      - version
      - savedAt
      - status
      additionalProperties: false
    EntitlementsCheckRequest:
      type: object
      properties:
        userId:
          type: string
        capability:
          type: string
          enum:
          - SEMANTIC_SEARCH
          - RAG_CHAT
          - AI_INLINE_ASSIST
          - AI_CLUSTERING
          - AI_INSIGHT_REPORT
          - EXPORT
          - SHARE_LINK
          - PUBLISH
          - IMPORT
        quantity:
          type: integer
          minimum: 1
        context:
          type: object
          additionalProperties: true
      required:
      - userId
      - capability
      - quantity
      additionalProperties: false
    EntitlementsCheckData:
      type: object
      properties:
        allowed:
          type: boolean
        reason:
          type: string
          nullable: true
        remaining:
          type: integer
          nullable: true
        entitlementSnapshotVersion:
          type: integer
      required:
      - allowed
      - entitlementSnapshotVersion
      additionalProperties: false
    InternalNoteSnapshotData:
      type: object
      properties:
        noteId:
          type: string
        documentGroupId:
          type: string
          description: 이 노트의 논리적 문서 그룹 경계. 오래된 Workspace 제공자가 생략하면 소비자는 default를 사용해야 한다.
        title:
          type: string
        markdown:
          type: string
        tags:
          type: array
          items:
            type: string
        folderId:
          type: string
          nullable: true
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
      - noteId
      - title
      - markdown
      - version
      - updatedAt
      additionalProperties: false
    InternalNoteContentPatchRequest:
      type: object
      properties:
        sourceService:
          type: string
        baseVersion:
          type: integer
        patchType:
          type: string
          enum:
          - REPLACE_RANGE
          - APPEND
          - REPLACE_ALL
          - APPLY_AI_SUGGESTION
        patch:
          type: object
          additionalProperties: true
        causationId:
          type: string
      required:
      - sourceService
      - baseVersion
      - patchType
      - patch
      - causationId
      additionalProperties: false
x-extracted-from:
  source: contracts-v2/brainx-openapi.ssot.yaml
  consumerId: internal.knowledge-intelligence
  conflictSide: right
