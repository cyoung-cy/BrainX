          type: object
          description: Optional narrowing scope inside the chat thread documentGroupId. noteScope.documentGroupId must match
            the thread documentGroupId when supplied.
          additionalProperties: true
        modelId:
          type: string
      required:
      - message
      - modelId
      additionalProperties: false
    ChatThreadDetailData:
      type: object
      properties:
