            - score
            additionalProperties: false
      required:
      - suggestions
      additionalProperties: false
    ClusterJobCreateRequest:
      type: object
      properties:
        scope:
          type: object
          additionalProperties: true
        algorithmOptions:
          type: object
          additionalProperties: true
      required:
      - scope
      additionalProperties: false
    ClusterJobData:
      type: object
      properties:
        clusterJobId:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        clusters:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
      - clusterJobId
      - status
      additionalProperties: false
    BridgeConceptsRequest:
      type: object
      properties:
        fromNoteId:
          type: string
        toNoteId:
          type: string
      required:
      - fromNoteId
      - toNoteId
      additionalProperties: false
    BridgeConceptsData:
      type: object
      properties:
        recommendations:
          type: array
          items:
            type: object
            properties:
              noteId:
                type: string
