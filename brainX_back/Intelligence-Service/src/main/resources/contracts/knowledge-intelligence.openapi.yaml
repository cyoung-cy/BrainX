          minimum: 1
          maximum: 50
          default: 20
      - name: cursor
        in: query
        required: false
        schema:
          type: string
          description: 이전 응답의 nextCursor. 값은 opaque cursor로 취급한다.
      - name: status
        in: query
        required: false
