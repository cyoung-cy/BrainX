components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Recommended for commands and job requests. Same key must return the same result for retries.
  schemas:
    ApiSuccessBase:
      type: object
      properties:
        success:
          type: boolean
          enum:
          - true
        message:
          type: string
      required:
      - success
      - message
      additionalProperties: false
    ApiErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
          - false
        data:
          nullable: true
        message:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            traceId:
              type: string
            details:
              type: object
              additionalProperties: true
              description: Machine-readable error details
          required:
          - code
          - message
          additionalProperties: true
      required:
      - success
      - message
      additionalProperties: false
    JobStatus:
      type: string
      enum:
      - PENDING
      - RUNNING
      - COMPLETED
      - FAILED
      - CANCELLED
    SemanticSearchRequest:
      type: object
      properties:
        documentGroupId:
          type: string
          description: Logical document group boundary for RAG/search isolation. If omitted, Knowledge Intelligence treats
            it as default.
        query:
          type: string
        filters:
          type: object
          additionalProperties: true
        limit:
          type: integer
        hybridWithClientKeywordIds:
          type: array
          items:
            type: string
      required:
      - query
      additionalProperties: false
    SemanticSearchData:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              noteId:
                type: string
              title:
                type: string
              excerpt:
                type: string
              score:
                type: number
              matchedType:
                type: string
                enum:
                - SEMANTIC
                - KEYWORD
                - HYBRID
            required:
            - noteId
            - title
            - score
            - matchedType
            additionalProperties: false
        tokenEstimate:
          type: integer
        charged:
          type: boolean
      required:
      - results
      - charged
      additionalProperties: false
    InlineAssistRequest:
      type: object
      properties:
        noteId:
          type: string
        selectedText:
          type: string
          nullable: true
        contextBefore:
          type: string
          nullable: true
        contextAfter:
          type: string
          nullable: true
        action:
          type: string
          enum:
          - SUMMARIZE
          - REWRITE
          - CONTINUE
          - TRANSLATE
        language:
          type: string
          example: ko
      required:
      - noteId
      - action
      additionalProperties: false
    AiSuggestionDecisionRequest:
      type: object
      properties:
        decision:
          type: string
          enum:
          - ACCEPTED
          - REJECTED
          - REGENERATED
      required:
      - decision
      additionalProperties: false
    AiSuggestionDecisionData:
      type: object
      properties:
        suggestionId:
          type: string
        decision:
          type: string
          enum:
          - ACCEPTED
          - REJECTED
          - REGENERATED
      required:
      - suggestionId
      - decision
      additionalProperties: false
    ChatThreadCreateRequest:
      type: object
      properties:
        documentGroupId:
          type: string
          description: Logical document group boundary for this chat thread. If omitted, Knowledge Intelligence treats it
            as default.
        title:
          type: string
        modelId:
          type: string
      required:
      - title
      - modelId
      additionalProperties: false
    ChatThreadData:
      type: object
      properties:
        threadId:
          type: string
        documentGroupId:
          type: string
        title:
          type: string
        modelId:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
      - threadId
      - documentGroupId
      - title
      - modelId
      - createdAt
      additionalProperties: false
    ChatMessageCreateRequest:
      type: object
      properties:
        message:
          type: string
