      - noteId
      additionalProperties: false
    LinkSuggestionsData:
      type: object
      properties:
        suggestions:
          type: array
          items:
            type: object
            properties:
              suggestionId:
                type: string
              targetNoteId:
                type: string
              targetTitle:
                type: string
              score:
                type: number
              reason:
                type: string
            required:
            - suggestionId
