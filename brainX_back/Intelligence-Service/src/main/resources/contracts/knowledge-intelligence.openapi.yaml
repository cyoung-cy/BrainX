openapi: 3.0.3
info:
  title: BrainX API SSOT - Knowledge Intelligence
  version: 1.0.0-revised
  description: 'BrainX public and internal REST contract.


    Revision policy:

    - Public/client API remains under /api/v1, except the currently implemented Ingestion publish helper which is exposed
    at /v1/publish-jobs.

    - Service-to-service synchronous APIs are explicitly isolated under /internal/v1.

    - Duplicate member-deletion cancel endpoint was removed.

    - /support/inquiries was consolidated into /support/tickets.

    - Token usage recording is event-first via AsyncAPI; no public REST command is exposed.

    - Publish jobs currently return 200 OK with clipboard-ready content.

    - Operation-level consumer metadata is expressed through x-consumers.

    - Operation-level event coupling is expressed through x-produces-events and references the AsyncAPI SSOT.'
servers:
- url: http://localhost:8080
  description: Local API Gateway
- url: https://api.brainx.com
  description: Production API Gateway
tags:
- name: Knowledge Intelligence
  description: Semantic search, RAG, AI suggestions, reports and model settings
paths:
  /api/v1/intelligence/semantic-search:
    post:
      operationId: semanticSearch
      summary: 시맨틱 검색
      tags:
      - Knowledge Intelligence
      x-producer-service: knowledge-intelligence
      x-visibility: public
      x-consumers:
      - id: web.home
        type: frontend
        description: Home, workspace sync, recent activity and search UI
      x-produces-events:
      - SemanticSearchPerformed
      - TokenUsageRecordedRequested
      x-internal-sync-calls:
      - targetService: commerce-operations
        operationId: checkEntitlementsInternal
        reason: capability/quota must be decided synchronously before model call or job acceptance
        required: true
      x-async-boundary: false
      description: Intelligence는 원본 노트를 소유하지 않고 Workspace 이벤트 기반 read model/vector index를 조회한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemanticSearchRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/SemanticSearchData'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - bearerAuth: []
