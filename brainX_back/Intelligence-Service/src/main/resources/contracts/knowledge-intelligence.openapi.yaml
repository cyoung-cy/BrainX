          description: AI 인라인 어시스트 SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events 스트림. 이벤트는 줄 단위 text/event-stream 프레임으로 전달된다.
              examples:
                delta_done:
                  summary: 종료 이벤트가 포함된 델타 스트림
                  value: 'event: delta

                    data: {"text":"JWT는"}


                    event: done

                    data: {"suggestionId":"sug_01J...","action":"REWRITE","modelId":"gpt-5.4-mini"}


                    '
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
