            - modelId
            - name
            - provider
            additionalProperties: false
        enabledModels:
          type: array
          items:
            type: string
        costInfo:
          type: object
          additionalProperties: true
      required:
      - models
      - enabledModels
      additionalProperties: false
    AiModelSettingsPutRequest:
