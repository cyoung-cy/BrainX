        summary:
          type: string
          nullable: true
        knowledgeGaps:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: object
            additionalProperties: true
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - reportId
      additionalProperties: false
    StyleProfileData:
      type: object
      properties:
        conversationTone:
          type: object
          additionalProperties: true
        writingStyle:
          type: object
          additionalProperties: true
        assistanceStyle:
