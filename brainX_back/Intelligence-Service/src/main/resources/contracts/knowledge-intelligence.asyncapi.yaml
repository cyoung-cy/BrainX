  schemas:
    EventEnvelope:
      type: object
      description: Common BrainX event envelope
      properties:
        eventId:
          type: string
          example: evt_01J...
        eventType:
          type: string
        eventVersion:
          type: integer
          example: 1
        occurredAt:
          type: string
          format: date-time
        producer:
          type: string
        tenantId:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        correlationId:
          type: string
          example: req_01J...
        causationId:
          type: string
          nullable: true
        idempotencyKey:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
      required:
      - eventId
      - eventType
      - eventVersion
      - occurredAt
      - producer
      - correlationId
      - payload
      additionalProperties: false
    UserDeletionRequestedPayload:
      type: object
      properties:
        userId:
          type: string
        reason:
          type: string
          nullable: true
        deletionScheduledAt:
          type: string
          format: date-time
      required:
      - userId
      - deletionScheduledAt
      additionalProperties: false
    NoteCreatedPayload:
      type: object
      properties:
        noteId:
          type: string
        userId:
          type: string
        documentGroupId:
          type: string
          description: Logical document group boundary. If omitted by older producers, consumers should use default.
        title:
          type: string
        folderId:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        version:
          type: integer
      required:
      - noteId
      - userId
      - title
      - version
      additionalProperties: false
    NoteContentSavedPayload:
      type: object
      properties:
        noteId:
          type: string
        userId:
          type: string
        documentGroupId:
          type: string
          description: Logical document group boundary. If omitted by older producers, consumers should use default.
        version:
          type: integer
        markdownHash:
          type: string
        savedAt:
          type: string
          format: date-time
      required:
      - noteId
      - userId
      - version
      - markdownHash
      - savedAt
      additionalProperties: false
    NoteMetadataChangedPayload:
      type: object
      properties:
        noteId:
          type: string
        userId:
          type: string
        documentGroupId:
          type: string
          description: Logical document group boundary. If omitted by older producers, consumers should use default.
        title:
          type: string
          nullable: true
        folderId:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        archived:
          type: boolean
          nullable: true
        version:
          type: integer
        typography:
          $ref: '#/components/schemas/NoteTypography'
        order:
          type: integer
          nullable: true
      required:
      - noteId
      - userId
      - version
      additionalProperties: false
    NoteTypography:
      type: object
      nullable: true
      description: 노트 단위 타이포그래피 설정. OpenAPI NoteTypography와 동일한 구조(이벤트 payload용으로 AsyncAPI 문서에 별도 정의).
      properties:
        scalePercent:
          type: integer
          nullable: true
        fontFamily:
          type: string
          nullable: true
        overrides:
          type: object
          nullable: true
          properties:
            body:
              type: integer
              nullable: true
            h1:
              type: integer
              nullable: true
            h2:
              type: integer
              nullable: true
            h3:
              type: integer
              nullable: true
          additionalProperties: false
      additionalProperties: false
    NoteTrashedPayload:
      type: object
      properties:
