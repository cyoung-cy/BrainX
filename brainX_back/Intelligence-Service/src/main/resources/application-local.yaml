spring:
  config:
    import: optional:file:./.brainx-local.properties
  devtools:
    restart:
      enabled: false
  datasource:
    url: jdbc:h2:mem:intelligence_service;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
