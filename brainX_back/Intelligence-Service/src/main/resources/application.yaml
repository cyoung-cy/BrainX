server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: intelligence-service
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-5.4-mini}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/intelligence_service}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

brainx:
  jwt:
    secret: ${JWT_SECRET:replace_with_at_least_32_byte_secret}
  security:
    dev-auth:
      enabled: ${BRAINX_SECURITY_DEV_AUTH_ENABLED:false}
      user-id: ${BRAINX_SECURITY_DEV_USER_ID:dev-test-user}
  events:
    producer:
      enabled: ${BRAINX_EVENTS_PRODUCER_ENABLED:false}
      semantic-search-performed-topic: ${BRAINX_EVENTS_TOPIC_SEMANTIC_SEARCH_PERFORMED:brainx.knowledge.intelligence.semantic-search-performed.v1}
      token-usage-recorded-requested-topic: ${BRAINX_EVENTS_TOPIC_TOKEN_USAGE_RECORDED_REQUESTED:brainx.knowledge.intelligence.token-usage-recorded-requested.v1}
      ai-suggestion-created-topic: ${BRAINX_EVENTS_TOPIC_AI_SUGGESTION_CREATED:brainx.knowledge.intelligence.ai-suggestion-created.v1}
      ai-suggestion-decision-recorded-topic: ${BRAINX_EVENTS_TOPIC_AI_SUGGESTION_DECISION_RECORDED:brainx.knowledge.intelligence.ai-suggestion-decision-recorded.v1}
      chat-thread-created-topic: ${BRAINX_EVENTS_TOPIC_CHAT_THREAD_CREATED:brainx.knowledge.intelligence.chat-thread-created.v1}
      chat-message-created-topic: ${BRAINX_EVENTS_TOPIC_CHAT_MESSAGE_CREATED:brainx.knowledge.intelligence.chat-message-created.v1}
      cluster-job-requested-topic: ${BRAINX_EVENTS_TOPIC_CLUSTER_JOB_REQUESTED:brainx.knowledge.intelligence.cluster-job-requested.v1}
      cluster-job-completed-topic: ${BRAINX_EVENTS_TOPIC_CLUSTER_JOB_COMPLETED:brainx.knowledge.intelligence.cluster-job-completed.v1}
      insight-report-requested-topic: ${BRAINX_EVENTS_TOPIC_INSIGHT_REPORT_REQUESTED:brainx.knowledge.intelligence.insight-report-requested.v1}
      insight-report-completed-topic: ${BRAINX_EVENTS_TOPIC_INSIGHT_REPORT_COMPLETED:brainx.knowledge.intelligence.insight-report-completed.v1}
    consumer:
      enabled: ${BRAINX_EVENTS_CONSUMER_ENABLED:false}
      group-id: ${BRAINX_EVENTS_CONSUMER_GROUP_ID:intelligence-service}
  assist:
    default-model: ${OPENAI_CHAT_MODEL:gpt-5.4-mini}
  clustering:
    default-model: ${OPENAI_CHAT_MODEL:gpt-5.4-mini}
    max-notes: ${BRAINX_CLUSTERING_MAX_NOTES:50}
    max-clusters: ${BRAINX_CLUSTERING_MAX_CLUSTERS:6}
  insight:
    default-model: ${OPENAI_CHAT_MODEL:gpt-5.4-mini}
    max-notes: ${BRAINX_INSIGHT_MAX_NOTES:50}
    max-recommendations: ${BRAINX_INSIGHT_MAX_RECOMMENDATIONS:8}
  organization:
    default-model: ${OPENAI_CHAT_MODEL:gpt-5.4-mini}
    max-notes: ${BRAINX_ORGANIZATION_MAX_NOTES:50}
    max-proposed-folders: ${BRAINX_ORGANIZATION_MAX_PROPOSED_FOLDERS:8}
    max-proposed-moves: ${BRAINX_ORGANIZATION_MAX_PROPOSED_MOVES:20}
  connection:
    bridge:
      default-model: ${OPENAI_CHAT_MODEL:gpt-5.4-mini}
      max-recommendations: ${BRAINX_CONNECTION_BRIDGE_MAX_RECOMMENDATIONS:3}
  note-auto-link:
    model: ${OPENAI_CHAT_MODEL:gpt-5.4-mini}
    max-notes: ${BRAINX_NOTE_AUTO_LINK_MAX_NOTES:50}
    vector-top-k: ${BRAINX_NOTE_AUTO_LINK_VECTOR_TOP_K:20}
    min-vector-score: ${BRAINX_NOTE_AUTO_LINK_MIN_VECTOR_SCORE:0.35}
    min-confidence: ${BRAINX_NOTE_AUTO_LINK_MIN_CONFIDENCE:0.75}
    vector-strong-score: ${BRAINX_NOTE_AUTO_LINK_VECTOR_STRONG_SCORE:0.60}
    min-anchor-korean-chars: ${BRAINX_NOTE_AUTO_LINK_MIN_ANCHOR_KOREAN_CHARS:4}
    max-suggestions-per-source-target: ${BRAINX_NOTE_AUTO_LINK_MAX_SUGGESTIONS_PER_SOURCE_TARGET:1}
    max-suggestions-per-target-note: ${BRAINX_NOTE_AUTO_LINK_MAX_SUGGESTIONS_PER_TARGET_NOTE:5}
    relation-verifier-enabled: ${BRAINX_NOTE_AUTO_LINK_RELATION_VERIFIER_ENABLED:true}
    min-relation-confidence: ${BRAINX_NOTE_AUTO_LINK_MIN_RELATION_CONFIDENCE:0.70}
    max-source-windows-per-note: ${BRAINX_NOTE_AUTO_LINK_MAX_SOURCE_WINDOWS_PER_NOTE:12}
    max-suggestions-per-note: ${BRAINX_NOTE_AUTO_LINK_MAX_SUGGESTIONS_PER_NOTE:5}
  chat:
    title:
      enabled: ${BRAINX_CHAT_TITLE_ENABLED:true}
      model: ${BRAINX_CHAT_TITLE_MODEL:gpt-5.4-nano}
      max-length: ${BRAINX_CHAT_TITLE_MAX_LENGTH:20}
    router:
      enabled: ${BRAINX_CHAT_ROUTER_ENABLED:true}
      model: ${BRAINX_CHAT_ROUTER_MODEL:gpt-5.4-nano}
    rag:
      top-k: ${BRAINX_CHAT_RAG_TOP_K:8}
      min-score: ${BRAINX_CHAT_RAG_MIN_SCORE:0.35}
      max-chunks-per-note: ${BRAINX_CHAT_RAG_MAX_CHUNKS_PER_NOTE:2}
      max-context-chars: ${BRAINX_CHAT_RAG_MAX_CONTEXT_CHARS:8000}
  external-search:
    provider: ${BRAINX_EXTERNAL_SEARCH_PROVIDER:none}
    max-sources: ${BRAINX_EXTERNAL_SEARCH_MAX_SOURCES:8}
    timeout: ${BRAINX_EXTERNAL_SEARCH_TIMEOUT:20s}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      model: ${OPENAI_WEB_SEARCH_MODEL:gpt-5.5}
  ai:
    embedding:
      provider: ${BRAINX_AI_EMBEDDING_PROVIDER:none}
      voyage:
        api-key: ${VOYAGE_API_KEY:}
        base-url: ${VOYAGE_BASE_URL:https://api.voyageai.com}
        model: ${VOYAGE_EMBEDDING_MODEL:voyage-4-lite}
        dimensions: ${VOYAGE_EMBEDDING_DIMENSIONS:1024}
        truncation: ${VOYAGE_EMBEDDING_TRUNCATION:true}
        timeout: ${VOYAGE_EMBEDDING_TIMEOUT:10s}
  vector:
    qdrant:
      enabled: ${BRAINX_VECTOR_QDRANT_ENABLED:true}
      host: ${QDRANT_HOST:localhost}
      port: ${QDRANT_GRPC_PORT:6334}
      api-key: ${QDRANT_API_KEY:}
      collection-name: ${QDRANT_COLLECTION:brainx_note_search}
      use-tls: ${QDRANT_USE_TLS:false}
      initialize-schema: ${QDRANT_INITIALIZE_SCHEMA:true}
      dimensions: ${VOYAGE_EMBEDDING_DIMENSIONS:1024}
      timeout: ${QDRANT_TIMEOUT:10s}
  workspace:
    base-url: ${BRAINX_WORKSPACE_BASE_URL:http://localhost:8081}
    service-token: ${BRAINX_WORKSPACE_SERVICE_TOKEN:}
    timeout: ${BRAINX_WORKSPACE_TIMEOUT:5s}
  dev:
    external-search:
      enabled: ${BRAINX_DEV_EXTERNAL_SEARCH_ENABLED:false}
      query: ${BRAINX_DEV_EXTERNAL_SEARCH_QUERY:}
      user-id: ${BRAINX_DEV_EXTERNAL_SEARCH_USER_ID:sample-user}
      model-id: ${BRAINX_DEV_EXTERNAL_SEARCH_MODEL_ID:}
      max-sources: ${BRAINX_DEV_EXTERNAL_SEARCH_MAX_SOURCES:0}
      allowed-domains: ${BRAINX_DEV_EXTERNAL_SEARCH_ALLOWED_DOMAINS:}
      blocked-domains: ${BRAINX_DEV_EXTERNAL_SEARCH_BLOCKED_DOMAINS:}
    sample-rag:
      enabled: ${BRAINX_DEV_SAMPLE_RAG_ENABLED:false}
      command: ${BRAINX_DEV_SAMPLE_RAG_COMMAND:ingest}
      directory: ${BRAINX_DEV_SAMPLE_RAG_DIRECTORY:sample_notes}
      user-id: ${BRAINX_DEV_SAMPLE_RAG_USER_ID:sample-user}
      document-group-id: ${BRAINX_DEV_SAMPLE_RAG_DOCUMENT_GROUP_ID:default}
      folder-id: ${BRAINX_DEV_SAMPLE_RAG_FOLDER_ID:sample_notes}
      query: ${BRAINX_DEV_SAMPLE_RAG_QUERY:}
      top-k: ${BRAINX_DEV_SAMPLE_RAG_TOP_K:8}
      min-score: ${BRAINX_DEV_SAMPLE_RAG_MIN_SCORE:0.35}
      max-chunks-per-note: ${BRAINX_DEV_SAMPLE_RAG_MAX_CHUNKS_PER_NOTE:2}
      max-context-chars: ${BRAINX_DEV_SAMPLE_RAG_MAX_CONTEXT_CHARS:8000}
      chat-model: ${OPENAI_CHAT_MODEL:gpt-5.4-mini}
    chat-router:
      enabled: ${BRAINX_DEV_CHAT_ROUTER_ENABLED:false}
      command: ${BRAINX_DEV_CHAT_ROUTER_COMMAND:ask}
      directory: ${BRAINX_DEV_CHAT_ROUTER_DIRECTORY:sample_notes}
      user-id: ${BRAINX_DEV_CHAT_ROUTER_USER_ID:sample-user}
      document-group-id: ${BRAINX_DEV_CHAT_ROUTER_DOCUMENT_GROUP_ID:default}
      folder-id: ${BRAINX_DEV_CHAT_ROUTER_FOLDER_ID:sample_notes}
      tags: ${BRAINX_DEV_CHAT_ROUTER_TAGS:sample_notes}
      query: ${BRAINX_DEV_CHAT_ROUTER_QUERY:}
      model-id: ${BRAINX_DEV_CHAT_ROUTER_MODEL_ID:${OPENAI_CHAT_MODEL:gpt-5.4-mini}}
    inline-assist:
      enabled: ${BRAINX_DEV_INLINE_ASSIST_ENABLED:false}
      command: ${BRAINX_DEV_INLINE_ASSIST_COMMAND:run}
      user-id: ${BRAINX_DEV_INLINE_ASSIST_USER_ID:sample-user}
      note-id: ${BRAINX_DEV_INLINE_ASSIST_NOTE_ID:sample-inline-assist}
      action: ${BRAINX_DEV_INLINE_ASSIST_ACTION:}
      selected-text: ${BRAINX_DEV_INLINE_ASSIST_SELECTED_TEXT:}
      context-before: ${BRAINX_DEV_INLINE_ASSIST_CONTEXT_BEFORE:}
      context-after: ${BRAINX_DEV_INLINE_ASSIST_CONTEXT_AFTER:}
      language: ${BRAINX_DEV_INLINE_ASSIST_LANGUAGE:ko}
    connection-quality:
      enabled: ${BRAINX_DEV_CONNECTION_QUALITY_ENABLED:false}
      command: ${BRAINX_DEV_CONNECTION_QUALITY_COMMAND:run}
      directory: ${BRAINX_DEV_CONNECTION_QUALITY_DIRECTORY:sample_notes}
      user-id: ${BRAINX_DEV_CONNECTION_QUALITY_USER_ID:sample-user}
      document-group-id: ${BRAINX_DEV_CONNECTION_QUALITY_DOCUMENT_GROUP_ID:default}
      folder-id: ${BRAINX_DEV_CONNECTION_QUALITY_FOLDER_ID:sample_notes}
      tags: ${BRAINX_DEV_CONNECTION_QUALITY_TAGS:sample_notes}
      type: ${BRAINX_DEV_CONNECTION_QUALITY_TYPE:}
      source-path: ${BRAINX_DEV_CONNECTION_QUALITY_SOURCE_PATH:}
      source-note-id: ${BRAINX_DEV_CONNECTION_QUALITY_SOURCE_NOTE_ID:}
      note-paths: ${BRAINX_DEV_CONNECTION_QUALITY_NOTE_PATHS:}
      note-ids: ${BRAINX_DEV_CONNECTION_QUALITY_NOTE_IDS:}
      note-auto-link:
        enabled: ${BRAINX_DEV_NOTE_AUTO_LINK_ENABLED:false}
        command: ${BRAINX_DEV_NOTE_AUTO_LINK_COMMAND:analyze}
        strategy: ${BRAINX_DEV_NOTE_AUTO_LINK_STRATEGY:COMPARE}
        user-id: ${BRAINX_DEV_NOTE_AUTO_LINK_USER_ID:sample-user}
        document-group-id: ${BRAINX_DEV_NOTE_AUTO_LINK_DOCUMENT_GROUP_ID:default}
        max-notes: ${BRAINX_DEV_NOTE_AUTO_LINK_MAX_NOTES:0}
        model-id: ${BRAINX_DEV_NOTE_AUTO_LINK_MODEL_ID:${OPENAI_CHAT_MODEL:gpt-5.4-mini}}

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  endpoints:
    web:
      exposure:
        include: health,info
