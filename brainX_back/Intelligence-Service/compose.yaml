services:
  intelligence-service:
    build:
      context: .
    container_name: brainx-intelligence-service
    restart: unless-stopped
    env_file:
      - path: ./.brainx-local.properties
        required: false
    environment:
      - SERVER_PORT=8086
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/intelligence_service
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=change_me
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - QDRANT_HOST=qdrant
      - QDRANT_GRPC_PORT=6334
      - QDRANT_COLLECTION
      - BRAINX_WORKSPACE_BASE_URL=http://workspace-service:8082
      - BRAINX_WORKSPACE_SERVICE_TOKEN=local-service-token
      - BRAINX_SECURITY_DEV_AUTH_ENABLED=true
      - BRAINX_SECURITY_DEV_USER_ID=dev-test-user
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - BRAINX_EVENTS_CONSUMER_ENABLED=true
      - BRAINX_EVENTS_PRODUCER_ENABLED=true
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      workspace-service:
        condition: service_started
      kafka:
        condition: service_started

  workspace-service:
    build:
      context: ../Workspace-Service
    container_name: brainx-workspace-service-for-intelligence
    restart: unless-stopped
    environment:
      SERVER_PORT: "8082"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change_me
      WORKSPACE_DB_NAME: brainx_workspace
      DB_DRIVER: org.postgresql.Driver
      JPA_DDL_AUTO: update
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NEO4J_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: brainx_neo4j_local_password
      SERVICE_TOKEN: local-service-token
      JWT_SECRET: replace_with_same_32_byte_or_longer_secret_for_all_services
      PUBLIC_BASE_URL: http://localhost:3000
      SEED_DEMO_DATA: "true"
      BRAINX_EVENTS_OUTBOX_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_started

  kafka:
    image: apache/kafka:3.8.0
    container_name: brainx-intelligence-kafka
    restart: unless-stopped
    environment:
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:29092"
    volumes:
      - intelligence_kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: brainx-intelligence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: brainx_workspace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change_me
      WORKSPACE_DB_NAME: brainx_workspace
      INTELLIGENCE_DB_NAME: intelligence_service
    ports:
      - "5432:5432"
    volumes:
      - intelligence_postgres_data:/var/lib/postgresql/data
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brainx-intelligence-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26-community
    container_name: brainx-intelligence-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/brainx_neo4j_local_password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - intelligence_neo4j_data:/data
      - intelligence_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p brainx_neo4j_local_password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: brainx-intelligence-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  intelligence_kafka_data:
  intelligence_postgres_data:
  intelligence_neo4j_data:
  intelligence_neo4j_logs:
  qdrant_storage:
