server:
  port: 8080

spring:
  application:
    name: identity-access-service
  datasource:
    url: jdbc:mysql://localhost:3306/brainx_identity?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: saidayummy@gmail.com
    password: jnkoqwufbqgmzcfy
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:brainx-identity-service-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-expiration: 3600000 # 1시간 (ms)
  refresh-token-expiration: 604800000 # 7일 (ms)

oauth2:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:kakao-client-id}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/oauth/kakao/callback}
  google:
    client-id: ${GOOGLE_CLIENT_ID:google-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/oauth/google/callback}

logging:
  level:
    com.brainx: DEBUG
    org.springframework.security: DEBUG
