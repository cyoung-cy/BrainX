server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import:
    - optional:file:../.env[.properties]
    - optional:file:../env/user-service.env[.properties]
  application:
    name: User-Service
  datasource:
    url: ${DB_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${USER_DB_NAME:brainx_user}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:change_me}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

brainx:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:replace_with_at_least_32_byte_secret}
    access-token-expiration-millis: ${JWT_ACCESS_EXPIRATION:3600000}
    refresh-token-expiration-millis: ${JWT_REFRESH_EXPIRATION:604800000}
  email:
    verification-expiration-minutes: ${EMAIL_VERIFICATION_EXPIRATION_MINUTES:30}
    from: ${MAIL_FROM:${spring.mail.username}}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:your_google_client_id}
      client-secret: ${GOOGLE_CLIENT_SECRET:your_google_client_secret}
      redirect-uri: ${GOOGLE_REDIRECT_URI:${brainx.frontend-base-url}/oauth/google/callback}
      scope: openid email profile
      authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
      token-uri: https://oauth2.googleapis.com/token
      user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
    kakao:
      client-id: ${KAKAO_CLIENT_ID:your_kakao_rest_api_key}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      redirect-uri: ${KAKAO_REDIRECT_URI:${brainx.frontend-base-url}/oauth/kakao/callback}
      scope: profile_nickname
      authorization-uri: https://kauth.kakao.com/oauth/authorize
      token-uri: https://kauth.kakao.com/oauth/token
      user-info-uri: https://kapi.kakao.com/v2/user/me
    naver:
      client-id: ${NAVER_CLIENT_ID:your_naver_client_id}
      client-secret: ${NAVER_CLIENT_SECRET:your_naver_client_secret}
      redirect-uri: ${NAVER_REDIRECT_URI:${brainx.frontend-base-url}/oauth/naver/callback}
      scope: name email
      authorization-uri: https://nid.naver.com/oauth2.0/authorize
      token-uri: https://nid.naver.com/oauth2.0/token
      user-info-uri: https://openapi.naver.com/v1/nid/me
#    apple:
#      client-id: ${APPLE_CLIENT_ID:}
#      client-secret: ${APPLE_CLIENT_SECRET:}
#      redirect-uri: ${APPLE_REDIRECT_URI:${brainx.frontend-base-url}/oauth/apple/callback}
#      scope: name email
#      authorization-uri: https://appleid.apple.com/auth/authorize
#      token-uri: https://appleid.apple.com/auth/token
#      user-info-uri:

  service-token: ${SERVICE_TOKEN:local-service-token}

