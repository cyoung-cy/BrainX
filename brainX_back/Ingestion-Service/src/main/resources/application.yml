server:
  port: ${SERVER_PORT:8083}

spring:
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:../env/ingestion-service.env[.properties]
  application:
    name: ingestion-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  datasource:
    url: ${DB_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${INGESTION_DB_NAME:brainx_ingestion}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:change_me}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET:replace_with_at_least_32_byte_secret}

notion:
  client-id: ${NOTION_CLIENT_ID:your_notion_client_id}
  client-secret: ${NOTION_CLIENT_SECRET:your_notion_client_secret}
  oauth-url: https://api.notion.com/v1/oauth/authorize
  token-url: https://api.notion.com/v1/oauth/token
  redirect-uri: ${NOTION_REDIRECT_URI:http://localhost:3000/notion-callback}

workspace-service:
  base-url: ${WORKSPACE_SERVICE_URL:http://localhost:8082}

cdn:
  base-url: ${CDN_BASE_URL:https://cdn.brainx.com}

asset:
  storage-dir: ${ASSET_STORAGE_DIR:./asset-storage}
  max-size-bytes: ${ASSET_MAX_SIZE_BYTES:5368709120}

brainx:
  events:
    producer:
      enabled: ${BRAINX_EVENTS_PRODUCER_ENABLED:false}

logging:
  level:
    com.brainx: DEBUG

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  endpoints:
    web:
      exposure:
        include: health,info
