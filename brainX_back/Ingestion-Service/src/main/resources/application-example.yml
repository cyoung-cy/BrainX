server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: ingestion-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/brainx_ingestion?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET:replace_with_at_least_32_byte_secret}

notion:
  client-id: ${NOTION_CLIENT_ID:your_notion_client_id}
  client-secret: ${NOTION_CLIENT_SECRET:your_notion_client_secret}
  oauth-url: https://api.notion.com/v1/oauth/authorize
  token-url: https://api.notion.com/v1/oauth/token
  redirect-uri: ${NOTION_REDIRECT_URI:http://localhost:3000/notion-callback}

workspace-service:
  base-url: ${WORKSPACE_SERVICE_URL:http://localhost:8082}

cdn:
  base-url: ${CDN_BASE_URL:https://cdn.brainx.com}

logging:
  level:
    com.brainx: DEBUG
