server:
  port: 0

spring:
  application:
    name: ingestion-service-test
  datasource:
    url: jdbc:h2:mem:brainx_ingestion_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

brainx:
  jwt:
    secret: test_ingestion_secret_that_is_long_enough_for_hmac

notion:
  client-id: test-notion-client-id
  client-secret: test-notion-client-secret
  token-url: https://api.notion.com/v1/oauth/token

asset:
  max-size-bytes: 5368709120
  storage:
    base-path: /tmp/brainx-test-assets
