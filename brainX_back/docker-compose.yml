services:
  user-postgres:
    image: postgres:16-alpine
    container_name: brainx-user-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-brainx_user}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      - "5432:5432"
    volumes:
      - brainx_user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  workspace-postgres:
    image: postgres:16-alpine
    container_name: brainx-workspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${WORKSPACE_DB_NAME:-brainx_workspace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      - "5433:5432"
    volumes:
      - brainx_workspace_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion-mysql:
    image: mysql:8.4
    container_name: brainx-ingestion-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${INGESTION_DB_NAME:-brainx_ingestion}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
    ports:
      - "3306:3306"
    volumes:
      - brainx_ingestion_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  brainx_user_postgres_data:
  brainx_workspace_postgres_data:
  brainx_ingestion_mysql_data:
