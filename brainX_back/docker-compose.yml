services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: brainx-kafka
    restart: unless-stopped
    environment:
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:29092"
    volumes:
      - brainx_kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
  gateway-service:
    profiles:
      - apps
    build:
      context: ./Gateway-Service
    container_name: brainx-gateway-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/gateway-service.env
    environment:
      SERVER_PORT: "8088"
      SERVICE_TOKEN: ${SERVICE_TOKEN:-local-service-token}
      USER_SERVICE_URL: http://user-service:8080
      WORKSPACE_SERVICE_URL: http://workspace-service:8082
      INGESTION_SERVICE_URL: http://ingestion-service:8083
      COMMERCE_SERVICE_URL: http://commerce-service:8084
      ADMIN_SERVICE_URL: http://admin-service:8085
    ports:
      - "8088:8088"
    depends_on:
      user-service:
        condition: service_started
      workspace-service:
        condition: service_started
      ingestion-service:
        condition: service_started
      commerce-service:
        condition: service_started

  user-service:
    profiles:
      - apps
    build:
      context: ./User-Service
    container_name: brainx-user-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/user-service.env
    environment:
      SERVER_PORT: "8080"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  workspace-service:
    profiles:
      - apps
    build:
      context: ./Workspace-Service
    container_name: brainx-workspace-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/workspace-service.env
    environment:
      SERVER_PORT: "8082"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  ingestion-service:
    profiles:
      - apps
    build:
      context: ./Ingestion-Service
    container_name: brainx-ingestion-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/ingestion-service.env
    environment:
      SERVER_PORT: "8083"
      POSTGRES_HOST: postgres
      WORKSPACE_SERVICE_URL: http://workspace-service:8082
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      workspace-service:
        condition: service_started

  commerce-service:
    profiles:
      - apps
    build:
      context: ./Commerce-Service
    container_name: brainx-commerce-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/commerce-service.env
    environment:
      SERVER_PORT: "8084"
      POSTGRES_HOST: postgres
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy

  admin-service:
    profiles:
      - apps
    build:
      context: ./Admin-Service
    container_name: brainx-admin-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/admin-service.env
    environment:
      SERVER_PORT: "8085"
      POSTGRES_HOST: postgres
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-brainx_admin}
      GATEWAY_SERVICE_URL: http://gateway-service:8088
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      gateway-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: brainx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-brainx_user}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      USER_DB_NAME: ${USER_DB_NAME:-brainx_user}
      WORKSPACE_DB_NAME: ${WORKSPACE_DB_NAME:-brainx_workspace}
      INGESTION_DB_NAME: ${INGESTION_DB_NAME:-brainx_ingestion}
      COMMERCE_DB_NAME: ${COMMERCE_DB_NAME:-brainx_commerce}
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-brainx_admin}
    ports:
      - "5432:5432"
    volumes:
      - brainx_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brainx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26-community
    container_name: brainx-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-brainx_neo4j_local_password}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL_SIZE:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX_SIZE:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-512m}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - brainx_neo4j_data:/data
      - brainx_neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USERNAME:-neo4j} -p ${NEO4J_PASSWORD:-brainx_neo4j_local_password} 'RETURN 1'",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  brainx_kafka_data:
  brainx_postgres_data:
  brainx_neo4j_data:
  brainx_neo4j_logs:
