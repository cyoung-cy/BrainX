server:
  port: ${SERVER_PORT:8084}

spring:
  config:
    import:
    - optional:file:../.env[.properties]
    - optional:file:../env/commerce-service.env[.properties]
  application:
    name: Commerce-Service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/brainx_commerce}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:change_me}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

brainx:
  jwt:
    secret: ${JWT_SECRET:replace_with_at_least_32_byte_secret}
  service-token: ${SERVICE_TOKEN:local-service-token}
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:3000}

toss:
  client-key: ${TOSS_CLIENT_KEY:your_toss_client_key}
  secret-key: ${TOSS_SECRET_KEY:your_toss_secret_key}
  confirm-url: ${TOSS_CONFIRM_URL:https://api.tosspayments.com/v1/payments/confirm}

logging:
  level:
    com.brainx: DEBUG
