server:
  port: ${SERVER_PORT:8084}

spring:
  config:
    import:
    - optional:file:../.env[.properties]
    - optional:file:../env/commerce-service.env[.properties]
  application:
    name: Commerce-Service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  datasource:
    url: ${DB_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${COMMERCE_DB_NAME:brainx_commerce}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:change_me}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

brainx:
  jwt:
    secret: ${JWT_SECRET:replace_with_at_least_32_byte_secret}
  service-token: ${SERVICE_TOKEN:local-service-token}
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:3000}
  events:
    outbox:
      enabled: ${BRAINX_EVENTS_OUTBOX_ENABLED:false}
      relay-delay-ms: ${BRAINX_EVENTS_OUTBOX_RELAY_DELAY_MS:2000}

toss:
  client-key: ${TOSS_CLIENT_KEY:your_toss_client_key}
  secret-key: ${TOSS_SECRET_KEY:your_toss_secret_key}
  confirm-url: ${TOSS_CONFIRM_URL:https://api.tosspayments.com/v1/payments/confirm}
  cancel-url: ${TOSS_CANCEL_URL:https://api.tosspayments.com/v1/payments/%s/cancel}

logging:
  level:
    com.brainx: DEBUG
