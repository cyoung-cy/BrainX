
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #ECEEFF;
  font-family: -apple-system, 'Pretendard', sans-serif;
  padding: 44px 28px 60px;
}
.page { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 52px; }

.sec-label {
  font-size: 10px; color: #B0ACCC;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 20px;
}

.mark {
  width: var(--sz); height: var(--sz);
  border-radius: calc(var(--sz) * 0.245);
  background: linear-gradient(135deg, #4F8EF7 0%, #7B7AEE 48%, #A78BFA 100%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* HERO */
.hero { display: flex; align-items: center; gap: 48px; flex-wrap: wrap; justify-content: center; }
.hero-mark {
  --sz: 128px;
  width: var(--sz); height: var(--sz);
  border-radius: calc(var(--sz) * 0.245);
  background: linear-gradient(135deg, #4F8EF7 0%, #7B7AEE 48%, #A78BFA 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 24px 56px rgba(123,122,238,0.42), 0 6px 18px rgba(79,142,247,0.2);
}
.wm-col { display: flex; flex-direction: column; gap: 14px; }
.wm-row { display: flex; align-items: center; gap: 14px; }
.wm-text {
  font-weight: 700; letter-spacing: -0.03em; line-height: 1;
  background: linear-gradient(135deg, #4F8EF7, #7B7AEE, #A78BFA);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.wm-sub { font-size: 12px; color: #A8A4C4; letter-spacing: 0.04em; margin-left: 2px; margin-top: 4px; }

/* SIZE ROW */
.size-row { display: flex; align-items: flex-end; gap: 22px; flex-wrap: wrap; }
.size-item { display: flex; flex-direction: column; align-items: center; gap: 9px; }
.size-name { font-size: 10px; color: #C0BCDC; }

/* BG */
.bg-row { display: flex; gap: 12px; flex-wrap: wrap; }
.bg-card {
  flex: 1; min-width: 150px; border-radius: 18px;
  padding: 32px 20px; display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.bg-light { background: #fff; border: 1px solid #E4E1FF; }
.bg-dark  { background: #11102A; }
.bg-grad  { background: linear-gradient(135deg, #4F8EF7, #7B7AEE, #A78BFA); }
.bg-label-l { font-size: 11px; color: #C0BCDC; }
.bg-label-d { font-size: 11px; color: rgba(255,255,255,0.3); }

/* TOKENS */
.token-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.token-item { display: flex; flex-direction: column; gap: 7px; align-items: center; }
.token-val { font-size: 10px; color: #A8A4C4; text-align: center; line-height: 1.5; }
</style>
